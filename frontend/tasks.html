<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Tasker Projects</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Your styles (keep this LAST) -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
      <a class="navbar-brand fw-bold" href="#">Tasker</a>

      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="projects.html">Projects</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="tasks.html">Tasks</a>
          </li>
        </ul>

        <span class="navbar-text me-3" id="current-user"></span>
        <button class="btn btn-outline-light btn-sm" onclick="logout()">
          Logout
        </button>
      </div>
    </nav>
    <div class="container-fluid mt-4 px-4">
      <h2 id="project-title" class="mb-4"></h2>

      <div class="row mb-3">
        <div class="col-md-5">
          <input
            type="text"
            id="taskTitle"
            class="form-control"
            placeholder="Task title"
          />
        </div>
        <div class="col-md-3">
          <input type="date" id="taskDueDate" class="form-control" />
        </div>
        <div class="col-md-3">
          <button class="btn btn-primary w-100" onclick="createTask()">
            Add Task
          </button>
        </div>
      </div>

      <div class="row g-3">
        <!-- PENDING -->
        <div class="col-md-4">
          <h5 class="text-center">Pending</h5>
          <div id="pendingTasks" class="list-group min-vh-50"></div>
        </div>

        <!-- IN PROGRESS -->
        <div class="col-md-4">
          <h5 class="text-center">In Progress</h5>
          <div id="inProgressTasks" class="list-group min-vh-50"></div>
        </div>

        <!-- DONE -->
        <div class="col-md-4">
          <h5 class="text-center">Done</h5>
          <div id="doneTasks" class="list-group min-vh-50"></div>
        </div>
      </div>
    </div>

    <!-- EDIT TASK MODAL -->
    <div class="modal fade" id="editTaskModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Edit Task</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body">
            <input type="hidden" id="editTaskId" />
            <input
              type="text"
              id="editTitle"
              class="form-control mb-2"
              placeholder="Task title"
            />
            <select id="editStatus" class="form-select mb-2">
              <option value="pending">Pending</option>
              <option value="in-progress">In Progress</option>
              <option value="done">Done</option>
            </select>

            <input type="date" id="editDueDate" class="form-control" />
          </div>

          <div class="modal-footer">
            <button class="btn btn-primary" onclick="saveTaskEdit()">
              Save
            </button>
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Cancel
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="app.js"></script>
  </body>
</html>
