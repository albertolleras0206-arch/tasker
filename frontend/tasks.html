<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Tasker Projects</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet" />

    <!-- button(ICONS) styles -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />

    <!-- Your styles (keep this LAST) -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
      <a class="navbar-brand fw-bold" href="#">Tasker</a>

      <!-- TOGGLER -->
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarContent">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- COLLAPSIBLE CONTENT -->
      <div class="collapse navbar-collapse" id="navbarContent">
        <ul class="navbar-nav me-auto mt-2 mt-lg-0">
          <li class="nav-item">
            <a class="nav-link active" href="projects.html">Projects</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="tasks.html">Tasks</a>
          </li>
        </ul>

        <div
          class="d-flex flex-column flex-lg-row align-items-lg-center gap-2 mt-3 mt-lg-0">
          <span class="navbar-text" id="current-user"></span>
          <button class="btn btn-outline-light btn-sm" onclick="logout()">
            Logout
          </button>
        </div>
      </div>
    </nav>

    <div class="container-fluid mt-3 px-4">
      <h2 id="project-title" class="text-center mb-2"></h2>

      <div class="row justify-content-center g-1 mb-2">
        <div class="col-12 col-md-3 col-lg-3">
          <input
            type="text"
            id="taskTitle"
            class="form-control"
            placeholder="Task title" />
        </div>

        <div class="col-12 col-md-3 col-lg-3">
          <input type="date" id="taskDueDate" class="form-control" />
        </div>

        <div class="col-12 col-md-3 col-lg-2">
          <button class="btn btn-primary w-100" onclick="createTask()">
            <i class="bi bi-plus-lg"></i>
          </button>
        </div>
      </div>

      <!-- MANAGE MEMBERS -->
      <div class="row justify-content-center mb-3">
        <div class="col-12 col-md-3 col-lg-2">
          <button
            class="btn btn-dark w-100"
            data-bs-toggle="modal"
            data-bs-target="#memberModal"
            onclick="loadMembersList()">
            <i class="bi bi-people-fill me-1"></i> Manage Members
          </button>
        </div>
      </div>

      <div class="row g-3">
        <!-- PENDING -->
        <div class="col-md-4">
          <h5 class="text-center">
            <i class="bi bi-hourglass-split"></i> Pending
          </h5>
          <div id="pendingTasks" class="list-group min-vh-50"></div>
        </div>

        <!-- IN PROGRESS -->
        <div class="col-md-4">
          <h5 class="text-center">
            <i class="bi bi-arrow-repeat"></i> In Progress
          </h5>
          <div id="inProgressTasks" class="list-group min-vh-50"></div>
        </div>

        <!-- DONE -->
        <div class="col-md-4">
          <h5 class="text-center"><i class="bi bi-check-circle"></i>Done</h5>
          <div id="doneTasks" class="list-group min-vh-50"></div>
        </div>
      </div>
    </div>

    <!-- EDIT TASK MODAL -->
    <div class="modal fade" id="editTaskModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Edit Task</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <input type="hidden" id="editTaskId" />
            <input
              type="text"
              id="editTitle"
              class="form-control mb-2"
              placeholder="Task title" />
            <select id="editStatus" class="form-select mb-2">
              <option value="pending">Pending</option>
              <option value="in-progress">In Progress</option>
              <option value="done">Done</option>
            </select>

            <input type="date" id="editDueDate" class="form-control" />
          </div>

          <div class="modal-footer">
            <button class="btn btn-primary" onclick="saveTaskEdit()">
              <i class="bi bi-check-lg"></i>
            </button>
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              <i class="bi bi-x-lg"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- MEMBER MANAGEMENT MODAL -->
    <div class="modal fade" id="memberModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">
              <i class="bi bi-people-fill me-1"></i> Manage Project Members
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <!-- ADD MEMBER -->
            <div class="d-flex gap-2 mb-3">
              <input
                type="email"
                id="memberEmail"
                class="form-control"
                placeholder="Enter registered user email" />

              <button class="btn btn-primary" onclick="addProjectMember()">
                <i class="bi bi-plus-lg"></i>
              </button>
            </div>

            <hr />

            <!-- CURRENT MEMBERS -->
            <h6>Current Members</h6>
            <ul id="membersList" class="list-group"></ul>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="app.js"></script>
  </body>
</html>
