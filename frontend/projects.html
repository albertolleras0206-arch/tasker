<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Tasker • Projects</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <!-- button(ICONS) styles -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet" />

    <!-- Custom styles -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
      <a class="navbar-brand fw-bold" href="#">Tasker</a>

      <!-- TOGGLER -->
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarContent">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- COLLAPSIBLE CONTENT -->
      <div class="collapse navbar-collapse" id="navbarContent">
        <ul class="navbar-nav me-auto mt-2 mt-lg-0">
          <li class="nav-item">
            <a class="nav-link active" href="projects.html">Projects</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="tasks.html">Tasks</a>
          </li>
        </ul>

        <div
          class="d-flex flex-column flex-lg-row align-items-lg-center gap-2 mt-3 mt-lg-0">
          <span class="navbar-text" id="current-user"></span>
          <button class="btn btn-outline-light btn-sm" onclick="logout()">
            Logout
          </button>
        </div>
      </div>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="container-fluid mt-4 px-4">
      <!-- HEADER -->
      <div class="text-center mb-4">
        <h2 class="fw-semibold">Projects</h2>
      </div>

      <!-- CREATE PROJECT -->
      <div class="row mb-4 justify-content-center">
        <div class="col-12 col-sm-8 col-md-6 col-lg-4">
          <div class="input-group shadow-sm">
            <input
              type="text"
              id="projectName"
              class="form-control"
              placeholder="New project name" />
            <button class="btn btn-primary" onclick="createProject()">
              <i class="bi bi-plus-lg"></i>
            </button>
          </div>
        </div>
      </div>

      <!-- PROJECT GRID -->
      <div id="projectList" class="row g-4 justify-content-center"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
