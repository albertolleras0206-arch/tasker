<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tasker Auth</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet" />

    <!-- Custom styles -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="auth-bg">
    <div class="auth-container">
      <div class="auth-card shadow-lg">
        <!-- Header -->
        <div class="text-center mb-4">
          <h2 class="fw-bold">Tasker</h2>
          <p class="text-muted small" id="form-title">Login to your account</p>
        </div>

        <!-- Name (Register only) -->
        <div id="name-group" class="mb-3">
          <input
            id="name"
            type="text"
            class="form-control auth-input"
            placeholder="Full Name" />
        </div>

        <!-- Email -->
        <div class="mb-3">
          <input
            id="email"
            type="email"
            class="form-control auth-input"
            placeholder="Email address"
            required />
        </div>

        <!-- Password -->
        <div class="mb-3">
          <input
            id="password"
            type="password"
            class="form-control auth-input"
            placeholder="Password"
            required />
        </div>

        <!-- Submit -->
        <button
          id="submit-btn"
          class="btn btn-primary w-100 auth-btn"
          onclick="handleSubmit()">
          Login
        </button>

        <!-- Toggle -->
        <p class="text-center mt-3 mb-0 small">
          <span id="toggle-text">Don't have an account?</span>
          <a href="#" id="toggle-link" onclick="toggleForm()">Register</a>
        </p>

        <!-- Message -->
        <p id="message" class="text-center mt-2 text-danger small"></p>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
