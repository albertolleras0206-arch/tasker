<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tasker Auth</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Custom styles -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="bg-light">
    <div
      class="container-fluid min-vh-100 d-flex justify-content-center align-items-center px-3"
    >
      <div class="card shadow p-4 w-100" style="max-width: 400px">
        <h3 class="text-center mb-4" id="form-title">Login</h3>

        <!-- Name (Register only) -->
        <div id="name-group" class="mb-3">
          <input
            id="name"
            type="text"
            class="form-control"
            placeholder="Full Name"
          />
        </div>

        <!-- Email -->
        <div class="mb-3">
          <input
            id="email"
            type="email"
            class="form-control"
            placeholder="Email"
            required
          />
        </div>

        <!-- Password -->
        <div class="mb-3">
          <input
            id="password"
            type="password"
            class="form-control"
            placeholder="Password"
            required
          />
        </div>

        <!-- Submit -->
        <button
          id="submit-btn"
          class="btn btn-primary w-100"
          onclick="handleSubmit()"
        >
          Login
        </button>

        <!-- Toggle -->
        <p class="text-center mt-3 mb-0">
          <span id="toggle-text">Don't have an account?</span>
          <a href="#" id="toggle-link" onclick="toggleForm()">Register</a>
        </p>

        <!-- Message -->
        <p id="message" class="text-center mt-2 text-danger"></p>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
